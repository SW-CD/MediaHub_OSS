<div class="login-container">
  <div class="login-box">
    <div class="login-header">
        <img src="assets/logo.svg" alt="App Logo" class="logo-icon">
        <h1 class="logo-text">MediaHub</h1>
        
        <p class="author-credits">
          <a href="https://www.swcd.lu" target="_blank" rel="noopener noreferrer">by SWCD</a>
        </p>
        
        <p>Welcome back! Please log in to continue.</p>
    </div>
    
    <div *ngIf="appInfo?.oidc?.enabled" class="mb-4">
      <button 
        type="button" 
        class="btn btn-secondary sso-btn" 
        (click)="redirectToOIDC()">
        <img src="assets/icons/keycloak-icon.svg" alt="SSO" class="sso-icon">
        Login via Single Sign-On
      </button>
      
      <div *ngIf="!appInfo?.oidc?.login_page_disabled" class="divider">
        <hr class="divider-line">
        <span class="divider-text">OR</span>
        <hr class="divider-line">
      </div>
    </div>

    <form *ngIf="!appInfo?.oidc?.login_page_disabled" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          class="form-control"
          [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          placeholder="Enter your username"
        />
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Enter your password"
        />
      </div>
      
      <div *ngIf="loginError" class="alert alert-danger">
        {{ loginError }}
      </div>
      
      <button 
        type="submit" 
        class="btn btn-primary login-button"
        [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading">Logging in...</span>
      </button>
    </form>

    <div *ngIf="appInfo?.oidc?.login_page_disabled" class="disabled-login-msg">
      <p>Local login is disabled. Please use Single Sign-On.</p>
      <div *ngIf="loginError" class="alert alert-danger mt-3">
        {{ loginError }}
      </div>
    </div>

  </div>
</div>
