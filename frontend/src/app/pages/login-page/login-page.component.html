<div class="login-container">
  <div class="login-box">
    <div class="login-header">
        <img src="assets/logo.svg" alt="App Logo" class="logo-icon">
        <h1 class="logo-text">MediaHub</h1>
        
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: -0.8rem; margin-bottom: 1.5rem;">
          <a 
            href="https://www.swcd.lu" 
            target="_blank" 
            rel="noopener noreferrer" 
            style="color: inherit; text-decoration: none;"
          >by SWCD</a>
        </p>
        
        <p>Welcome back! Please log in to continue.</p>
    </div>
    
    <div *ngIf="appInfo?.oidc?.enabled" class="mb-4">
      <button 
        type="button" 
        class="btn btn-secondary" 
        style="width: 100%; display: flex; justify-content: center; align-items: center; gap: 0.5rem;"
        (click)="redirectToOIDC()">
        <img src="assets/icons/keycloak-icon.svg" alt="SSO" style="width: 1.25rem; height: 1.25rem;">
        Login via Single Sign-On
      </button>
      
      <div *ngIf="!appInfo?.oidc?.login_page_disabled" style="display: flex; align-items: center; text-align: center; margin: 1.5rem 0;">
        <hr style="flex-grow: 1; border: none; border-top: 1px solid var(--border-color);">
        <span style="padding: 0 10px; color: var(--text-muted); font-size: 0.85rem;">OR</span>
        <hr style="flex-grow: 1; border: none; border-top: 1px solid var(--border-color);">
      </div>
    </div>

    <form *ngIf="!appInfo?.oidc?.login_page_disabled" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          class="form-control"
          [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          placeholder="Enter your username"
        />
      </div>
      
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          placeholder="Enter your password"
        />
      </div>
      
      <div *ngIf="loginError" class="alert alert-danger">
        {{ loginError }}
      </div>
      
      <button 
        type="submit" 
        class="btn btn-primary login-button"
        [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading">Logging in...</span>
      </button>
    </form>

    <div *ngIf="appInfo?.oidc?.login_page_disabled" style="text-align: center; color: var(--text-muted); padding: 1rem 0;">
      <p>Local login is disabled. Please use Single Sign-On.</p>
      <div *ngIf="loginError" class="alert alert-danger mt-3">
        {{ loginError }}
      </div>
    </div>

  </div>
</div>
