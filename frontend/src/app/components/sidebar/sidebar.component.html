<div class="sidebar-container" 
     [class.collapsed]="isCollapsed"
     *ngIf="currentUser$ | async as user">
  
  <header class="sidebar-header">
    <div class="logo-area">
      <div class="logo-container cursor-pointer" routerLink="/dashboard" title="Go to Databases Overview">
        <img src="assets/logo.svg" alt="App Logo" class="logo-icon">
        <h1 class="logo-text" *ngIf="!isCollapsed">MediaHub</h1>
      </div>
      <div class="app-version" *ngIf="!isCollapsed && (appInfo$ | async) as info">
          <a 
            href="https://www.swcd.lu" 
            target="_blank" 
            rel="noopener noreferrer" 
            style="color: inherit; text-decoration: none;"
          >by SWCD</a> | {{ info.version }}
        </div>
    </div>
  </header>

  <div class="databases-section" *ngIf="user.is_admin">
    <nav class="nav-links" style="margin-top: 0; padding: 0 0.5rem;">
      <a routerLink="/dashboard/admin/users" 
         routerLinkActive="active" 
         class="nav-link"
         [title]="isCollapsed ? 'Admin Panel' : ''">
        <img src="assets/icons/users-icon.svg" class="nav-link-icon" alt="admin-icon" />
        <span *ngIf="!isCollapsed">Admin Panel</span>
      </a>

      <a routerLink="/dashboard/admin/keys" 
         routerLinkActive="active" 
         class="nav-link"
         [title]="isCollapsed ? 'Global API Keys' : ''">
        <img src="assets/icons/key-icon.svg" class="nav-link-icon" alt="keys-icon" />
        <span *ngIf="!isCollapsed">Global Keys</span>
      </a>
      
      <a *ngIf="(appInfo$ | async)?.features?.audit_logs"
         routerLink="/dashboard/admin/audit" 
         routerLinkActive="active" 
         class="nav-link"
         [title]="isCollapsed ? 'Audit Logs' : ''">
        <img src="assets/icons/logs-icon.svg" class="nav-link-icon" alt="audit-icon" />
        <span *ngIf="!isCollapsed">Audit Logs</span>
      </a>
    </nav>
  </div>

  <footer class="sidebar-footer">
    
    <div class="user-info cursor-pointer" *ngIf="!isCollapsed" [routerLink]="['/dashboard/profile']" title="View Profile & Settings">
      <div class="user-avatar">{{ user.username.charAt(0).toUpperCase() }}</div>
      <div class="user-details">
        <div class="username" title="{{user.username}}">{{ user.username }}</div>
        <div class="user-role">{{ user.is_admin ? 'Administrator' : 'User' }}</div>
      </div>
    </div>

    <nav class="nav-links" *ngIf="!isCollapsed">
        <a [routerLink]="['/dashboard/profile']" routerLinkActive="active" class="nav-link">
            <img src="assets/icons/password-icon.svg" class="nav-link-icon" alt="profile-icon" />
            Profile & Settings
        </a>
        
        <a href="swagger/index.html" target="_blank" class="nav-link">
            <img src="assets/icons/api2-icon.svg" class="nav-link-icon" alt="api-icon" />
            API Docs
        </a>
    </nav>
    
    <button (click)="logout()" class="logout-button" [title]="isCollapsed ? 'Logout' : ''">
      <img src="assets/icons/logout-icon.svg" alt="Logout" class="logout-icon">
      <span *ngIf="!isCollapsed">Logout</span>
    </button>
    
    <button (click)="onToggleSidebar()" class="sidebar-toggle-btn" [title]="isCollapsed ? 'Expand Sidebar' : 'Collapse Sidebar'">
      <svg *ngIf="!isCollapsed" xmlns="http://www.w3.org/2000/svg" width="1.5em" height="1.5em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
      <svg *ngIf="isCollapsed" xmlns="http://www.w3.org/2000/svg" width="1.5em" height="1.5em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="15" y1="3" x2="15" y2="21"></line></svg>
    </button>

  </footer>
</div>
