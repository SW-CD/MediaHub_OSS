<app-modal [modalId]="'confirmationModal'" [modalTitle]="modalData.title || 'Confirm Action'">
  <div class="confirmation-content">
    <p>{{ modalData.message }}</p>
  </div>
  <div class="modal-actions">
    
    <button type="button" class="btn btn-secondary" (click)="onCancel()">
      {{ modalData.cancelText }}
    </button>
    
    <button 
      type="button" 
      class="btn" 
      [ngClass]="modalData.confirmButtonClass || 'btn-danger'" 
      (click)="onConfirm()">
      {{ modalData.confirmText }}
    </button>
    
  </div>
</app-modal>
